# Content Metadata Profile (Front Matter Schema)
#
# DOCTRINE:
# Front matter is supportive metadata only.
# It may assist rendering, filtering, search, and lifecycle display.
# It must not issue canonical identity, schema placement, routing truth,
# graph relationships, or cross-domain ownership.
# Meaning is determined by the `layout` field, but the field vocabulary is singular.

profile: content_front_matter
version: 2.0.0
description: "Universal front matter profile for blueprint docs and related markdown assets."

doctrine:
  system_of_record: false
  notes:
    - "Canonical identity comes from QiArchive or the owning system of record."
    - "Schema placement and routing truth do not come from front matter."
    - "Front matter may not redefine ownership, graph truth, or cross-domain relationships."
    - "Required fields vary by layout, but the field vocabulary remains singular."

display_modes:
  - always_show
  - hide_if_empty
  - always_hidden

sections:
  - id: core
    label: Core
    order: 10
  - id: lifecycle
    label: Lifecycle
    order: 20
  - id: classification
    label: Classification
    order: 30
  - id: context
    label: Context
    order: 40
  - id: relations
    label: Relations
    order: 50
  - id: system
    label: System
    order: 60
  - id: layout_specific
    label: Layout Specific
    order: 70

field_order:
  - layout
  - title
  - slug
  - summary
  - status

  - created_at
  - updated_at
  - author
  - owner

  - sensitivity
  - classification
  - realm_label

  - context
  - aliases
  - tags
  - keywords
  - references

  - target_system
  - target_scope
  - canonical_ref

  - uid
  - template_key
  - source_type

  - adr_id
  - supersedes
  - artifact_kind
  - registry_key
  - standard_key

fields:
  layout:
    type: string
    required: true
    section: core
    display: always_show
    description: "Document/layout type. Determines required conditional fields."
    options:
      - home
      - section
      - page
      - adr
      - standard
      - registry
      - appendix
      - template
      - artifact

  title:
    type: string
    required: true
    section: core
    display: always_show
    description: "Human-readable title."

  slug:
    type: string
    required: false
    section: core
    display: hide_if_empty
    description: "URL-friendly identifier. Does not control canonical identity."

  summary:
    type: string
    required: false
    section: core
    display: hide_if_empty
    description: "Short summary for humans/search. Non-canonical."

  status:
    type: string
    required: true
    section: core
    display: always_show
    description: "Document lifecycle state."
    options:
      - draft
      - active
      - proposed
      - accepted
      - superseded
      - archived

  created_at:
    type: string
    required: false
    section: lifecycle
    display: hide_if_empty
    description: "Creation date or timestamp."

  updated_at:
    type: string
    required: false
    section: lifecycle
    display: always_show
    description: "Last substantive update date or timestamp."

  author:
    type: string
    required: false
    section: lifecycle
    display: hide_if_empty
    description: "Human or system author."

  owner:
    type: string
    required: false
    section: lifecycle
    display: hide_if_empty
    description: "Maintainer or accountable owner."

  sensitivity:
    type: string
    required: false
    section: classification
    display: hide_if_empty
    description: "Must map to registry/sensitivity_classification.yaml."

  classification:
    type: string
    required: false
    section: classification
    display: hide_if_empty
    description: "Must map to registry/sensitivity_classification.yaml."

  realm_label:
    type: string
    required: false
    section: classification
    display: hide_if_empty
    description: "Optional UI/workspace filter label only. Does not dictate placement."

  context:
    type: string
    required: false
    section: context
    display: hide_if_empty
    description: "Brief reasoning or context statement."

  aliases:
    type: array
    items: string
    required: false
    section: context
    display: hide_if_empty
    description: "Alternative titles or natural language handles."

  tags:
    type: array
    items: string
    required: false
    section: context
    display: hide_if_empty
    description: "Semantic grouping tags."

  keywords:
    type: array
    items: string
    required: false
    section: context
    display: hide_if_empty
    description: "Search descriptors."

  references:
    type: array
    items: string
    required: false
    section: context
    display: hide_if_empty
    description: "Related document refs or external references."

  target_system:
    type: string
    required: false
    section: relations
    display: hide_if_empty
    description: "Primary system/module affected, if applicable."

  target_scope:
    type: string
    required: false
    section: relations
    display: hide_if_empty
    description: "Optional narrower scope such as schema, app, or feature."

  canonical_ref:
    type: string
    required: false
    section: relations
    display: always_hidden
    description: "Optional pointer to an external canonical ID. Referential only."

  uid:
    type: string
    required: false
    section: system
    display: always_hidden
    description: "Document-local stable identifier. Not canonical system identity."

  template_key:
    type: string
    required: false
    section: system
    display: always_hidden
    description: "Template used to create the document."

  source_type:
    type: string
    required: false
    section: system
    display: always_hidden
    description: "manual | generated | imported"
    options:
      - manual
      - generated
      - imported

  adr_id:
    type: string
    required: false
    section: layout_specific
    display: hide_if_empty
    description: "ADR identifier when layout=adr."

  supersedes:
    type: string
    required: false
    section: layout_specific
    display: hide_if_empty
    description: "Document or ADR superseded by this file."

  artifact_kind:
    type: string
    required: false
    section: layout_specific
    display: hide_if_empty
    description: "Artifact subtype when layout=artifact."
    options:
      - implementation_plan
      - walkthrough
      - task
      - architecture
      - report
      - other

  registry_key:
    type: string
    required: false
    section: layout_specific
    display: hide_if_empty
    description: "Registry identifier when layout=registry."

  standard_key:
    type: string
    required: false
    section: layout_specific
    display: hide_if_empty
    description: "Standard identifier when layout=standard."

layouts:
  home:
    required:
      - layout
      - title
      - status
  section:
    required:
      - layout
      - title
      - status
  page:
    required:
      - layout
      - title
      - status
  adr:
    required:
      - layout
      - title
      - status
      - adr_id
  standard:
    required:
      - layout
      - title
      - status
      - standard_key
  registry:
    required:
      - layout
      - title
      - status
      - registry_key
  appendix:
    required:
      - layout
      - title
      - status
  template:
    required:
      - layout
      - title
      - status
  artifact:
    required:
      - layout
      - title
      - status
      - artifact_kind

retired_fields:
  - qi_decimal
  - qid
  - type
  - node
  - system
  - naming_strategy
  - sort
  - related
  - parents
  - children
  - siblings
  - graph_weight
  - orbit
  - entangled
  - realm
  - realm_slug
  - id
  - short_code
  - domain_prefix