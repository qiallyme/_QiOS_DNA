version: 1
ignore:
  - pattern: "**/.git/**"
    reason: "tooling"
  - pattern: "**/node_modules/**"
    reason: "tooling"
  - pattern: "**/.cache/**"
    reason: "darkmatter"
  - pattern: "**/.logs/**"
    reason: "darkmatter"
  - pattern: "**/.infra/**"
    reason: "darkmatter"
  - pattern: "**/.meta/**"
    reason: "darkmatter"
  - pattern: "**/.archive/**"
    reason: "archives"
  - pattern: "**/dist/**"
    reason: "build_artifacts"
  - pattern: "**/build/**"
    reason: "build_artifacts"
  - pattern: "**/*.tmp"
    reason: "temp"
  - pattern: "**/~$*"
    reason: "temp"
  - pattern: "**/.DS_Store"
    reason: "os_noise"
  - pattern: "**/.obsidian/**"
    reason: "tooling"
