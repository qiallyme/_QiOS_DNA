version: 1.1.0

layers:

  "0_root_integrity":
    description: "Universe check: required roots exist, forbidden roots quarantined."
    rules:
      - rule_id: ROT.001
        priority: 10
        rule_type: require_folder
        scope_path: QiOS/
        conditions: {}
        action: create
        action_params:
          targets:
            - apps
            - workers
            - components
            - data
            - realms
            - sites
            - docs
            - templates
            - projects
        confidence_required: 1.0
        enabled: true
        # trunk-ignore(yamllint/quoted-strings)
        notes_human: All canonical roots must exist.

      - rule_id: ROT.020
        priority: 25
        rule_type: allow_pattern
        scope_path: QiOS/
        conditions:
          allowlist_ref: folder_registry.root_allowlist
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Only canonical roots allowed at QiOS top level.

  "1_darkmatter_physics":
    description: Protect system substrate.
    rules:
      - rule_id: DM.010
        priority: 10
        rule_type: protect_path
        scope_path: QiOS/darkmatter/**
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: DarkMatter cannot be moved/deleted by non-DM rules.

      - rule_id: DM.020
        priority: 15
        rule_type: protect_path
        scope_path: QiOS/.git/**
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Git repository metadata is protected system infrastructure.

      - rule_id: DM.030
        priority: 15
        rule_type: protect_path
        scope_path: QiOS/.obsidian/**
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Obsidian vault configuration is protected system infrastructure.

      - rule_id: DM.040
        priority: 20
        rule_type: protect_file
        scope_path: QiOS/.gitignore
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Git ignore file is protected system infrastructure.

      - rule_id: DM.050
        priority: 20
        rule_type: protect_file
        scope_path: QiOS/.env
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Environment file is protected (contains secrets, never committed).

      - rule_id: DM.060
        priority: 20
        rule_type: protect_file
        scope_path: QiOS/env.example
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Environment template is protected system infrastructure.

      - rule_id: DM.070
        priority: 20
        rule_type: protect_file
        scope_path: QiOS/.cursorrules
        conditions: {}
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Cursor rules file is protected system infrastructure.

      - rule_id: DM.080
        priority: 25
        rule_type: protect_pattern
        scope_path: QiOS/**
        conditions:
          pattern: '**/*.canvas'
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Canvas files are protected visual planning infrastructure.

      - rule_id: DM.090
        priority: 25
        rule_type: protect_pattern
        scope_path: QiOS/**
        conditions:
          pattern: '**/*kanban*.md'
        action: ignore
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Kanban board files are protected visual planning infrastructure.

      - rule_id: OBS.010
        priority: 30
        rule_type: require_table
        scope_path: Supabase
        conditions:
          targets: [worker_status, system_event]
        action: alert
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: "Health/observability substrate required. Infrastructure check (Layer 1: Dark Matter)."

      - rule_id: OBS.020
        priority: 35
        rule_type: health_worker
        scope_path: '*'
        conditions: {}
        action: alert
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: "GINA Orchestrator must respond to health checks. Infrastructure check (Layer 1: Dark Matter)."

      - rule_id: DEV.ERROR.MEMORY.V1
        priority: 40
        rule_type: dev_assist_requirement
        scope_path: '*'
        conditions:
          applies_to:
            - worker: local_core
            - worker: orchestrator
            - app: QiLauncher
          triggers:
            - tag: dev_assist
            - endpoint: /dev/code_assist
        action: enforce
        action_params:
          must_query_dev_error_log: true
          max_recent_errors: 10
          include_fix_summary: true
          avoid_reintroducing_resolved_errors: true
        confidence_required: 1.0
        enabled: true
        notes_human: "For any development-assistance request involving a specific file or symbol, QiOS must query the dev_error_log for prior errors and fixes and inject them into the AI context before generating suggestions."

  "2_realm_schema":
    description: Validate realm structures and activation state.
    rules:
      - rule_id: RLM.010
        priority: 10
        rule_type: require_subtree
        scope_path: QiOS/realms/**
        conditions:
          subtree_ref: folder_registry.realm_required_subtrees.common
        action: create
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: All realms get common subtree.

      - rule_id: RLM.050
        priority: 50
        rule_type: realm_activation_gate
        scope_path: QiOS/realms/**
        conditions:
          registry_ref: realms_registry.realms
          must_be_enabled: true
        action: quarantine
        action_params:
          target: QiOS/realms/archives/disabled_realms
        confidence_required: 1.0
        enabled: true
        notes_human: Disabled realms are not routing targets.

  "3_file_identity":
    description: Validate file legitimacy (type/MIME/placement).
    rules: []

  "4_naming":
    description: Enforce naming law.
    rules:
      - rule_id: NAM.001
        priority: 10
        rule_type: naming_schema
        scope_path: QiOS/**
        conditions:
          schema: '{slug}.{ext}'
        action: rename
        action_params:
          naming_strategy: slug_only
        confidence_required: 1.0
        enabled: true
        notes_human: Filename must be slug + extension.

      - rule_id: NAM.004
        priority: 20
        rule_type: forbid_pattern
        scope_path: QiOS/**
        conditions:
          pattern: '^\\d{4}-\\d{2}-\\d{2}_'
        action: rename
        action_params:
          strip_date_prefix: true
        confidence_required: 1.0
        enabled: true
        notes_human: Dates forbidden in filenames.

  "5_metadata":
    description: Inject/repair front matter.
    rules:
      - rule_id: MTA.001
        priority: 10
        rule_type: frontmatter_require
        scope_path: QiOS/realms/**
        conditions:
          required_ref: front_matter_schema_v1
        action: inject_frontmatter
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Canonical front matter required.

      - rule_id: MTA.010
        priority: 20
        rule_type: qid_auto_populate
        scope_path: QiOS/**
        conditions:
          qid_null: true
        action: call_rpc
        action_params:
          rpc_name: qios_next_qid
          target_field: qid
        confidence_required: 1.0
        enabled: true
        notes_human: If qid is null, call qios_next_qid() RPC to generate QID. QID becomes required for canonical nodes after Layer 5.

  "6_semantic_routing":
    description: Embeddings + RAG routing.
    rules:
      - rule_id: SEM.010
        priority: 10
        rule_type: queue_required
        scope_path: ingestion_queue
        conditions: {}
        action: alert
        action_params: {}
        confidence_required: 1.0
        enabled: true
        notes_human: Semantic ingestion queue must exist and be processing.

      - rule_id: SEM.030
        priority: 30
        rule_type: route_confidence_cap
        scope_path: QiOS/**
        conditions:
          sensitivity: internal
          classification: system_darkmatter
        action: force_route
        action_params:
          confidence_cap: 0.10
          destination: darkmatter/
          no_semantic_mirror: true
        confidence_required: 1.0
        enabled: true
        notes_human: If sensitivity=internal AND classification=system_darkmatter, route confidence hard-cap to 0.10, destination forced to darkmatter/, no semantic mirroring to clients.

  "7_self_healing":
    description: Dedupe/version/quarantine.
    rules:
      - rule_id: HEL.010
        priority: 10
        rule_type: visibility_mask
        scope_path: QiOS/**
        conditions:
          matrix_ref: sensitivity_classification_matrix_v1
        action: apply_visibility
        action_params:
          mask_by_sensitivity: true
          mask_by_classification: true
        confidence_required: 1.0
        enabled: true
        notes_human: Visibility mask based on sensitivity/classification. UI reads this to hide stuff in client portals.

      - rule_id: HEL.040
        priority: 40
        rule_type: dedupe_restriction
        scope_path: QiOS/**
        conditions:
          classification_in: [legal_hold, personal_health]
        action: restrict_dedupe
        action_params:
          allow_byte_identical: true
          forbid_semantic_merge: true
          require_human_approval: true
        confidence_required: 1.0
        enabled: true
        notes_human: If classification in (legal_hold, personal_health), dedupe only byte-identical, semantic merges forbidden without human approval.
