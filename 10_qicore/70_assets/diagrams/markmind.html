<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QiOS Master Blueprint - Interactive Mind Map</title>
  <style>
    /* Full screen modern mind map style */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      width: 100vw; 
      background: #0f172a; 
      overflow: hidden; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
    }
    #mindmap { 
      width: 100vw; 
      height: 100vh; 
      display: block; 
    }
    .controls { 
      position: absolute; 
      bottom: 30px; 
      right: 30px; 
      color: rgba(255, 255, 255, 0.6); 
      font-size: 13px; 
      background: rgba(30, 41, 59, 0.8); 
      backdrop-filter: blur(8px);
      padding: 12px 18px; 
      border-radius: 12px; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none; 
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      z-index: 1000;
    }
    .markmap-node-text {
      fill: #fff !important;
      font-weight: 500;
    }
    .markmap-link {
      stroke-width: 2px !important;
      stroke-opacity: 0.5 !important;
    }
  </style>
</head>
<body>

  <svg id="mindmap"></svg>
  <div class="controls">Scroll to Zoom • Drag to Pan • Click Dots to Expand</div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>

  <script>
    const { Markmap } = window.markmap;

    function transformData(node) {
      return {
        content: `<strong>${node.name}</strong>`,
        children: node.children ? node.children.map(transformData) : []
      };
    }

    async function init() {
      try {
        // Fetch the data from the generated build file
        const response = await fetch('markmind-data.json');
        if (!response.ok) throw new Error("Could not load markmind-data.json");
        const rawData = await response.json();
        const data = transformData(rawData);

        // Map settings
        const mm = Markmap.create('#mindmap', {
          autoFit: true,
          duration: 500,
          nodeMinHeight: 20,
          spacingVertical: 12,
          spacingHorizontal: 80,
          paddingX: 16,
          initialExpandLevel: 2,
          // Apple-style clean color palette (Electric Blue focus)
          color: (node) => {
             const colors = ['#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#f43f5e'];
             return colors[node.depth % colors.length];
          }
        }, data);

        // Handle window resizing
        window.addEventListener('resize', () => mm.fit());

      } catch (err) {
        console.error("Markmap init failed:", err);
        // Fallback or error display
        document.body.innerHTML += `<div style="color:white; padding:20px;">Error loading map data: ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
